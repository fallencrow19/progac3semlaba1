name: CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            compiler: g++
          - os: windows-latest
            compiler: cl
          - os: macos-latest
            compiler: clang++
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build on Ubuntu/MacOS
      if: matrix.os != 'windows-latest'
      run: |
        g++ -o hello main.cpp version.cpp
        ./hello
    
    - name: Build on Windows
      if: matrix.os == 'windows-latest'
      run: |
        cl /EHsc main.cpp version.cpp
        hello.exe
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: hello-${{ matrix.os }}
        path: |
          hello
          hello.exe
          hello.pdb
